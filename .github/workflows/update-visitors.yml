name: Update visitor history

on:
  schedule:
    - cron: '10 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update visitor snapshot
        run: node scripts/update-visitors.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- data/visitors.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/visitors.json
          git commit -m "Update visitor history"
          git push
