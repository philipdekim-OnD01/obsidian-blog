<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Anthropic annualized revenue growth chart">
  <rect width="1200" height="700" rx="20" fill="#f8fafc"/>

  <text x="42" y="58" fill="#111827" font-size="30" font-weight="800">Anthropic 연환산 매출 성장 그래프</text>
  <text x="42" y="92" fill="#52616f" font-size="18">영상에서 언급된 수치: 2022년 말 1,000만 달러에서 2026년 5월 450억 달러까지 급증</text>

  <rect x="90" y="120" width="980" height="470" rx="16" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>

  <line x1="150" y1="520" x2="1020" y2="520" stroke="#94a3b8" stroke-width="2"/>
  <line x1="150" y1="160" x2="150" y2="520" stroke="#94a3b8" stroke-width="2"/>

  <g fill="#64748b" font-size="16">
    <text x="98" y="524">10M</text>
    <text x="86" y="446">100M</text>
    <text x="92" y="368">1B</text>
    <text x="80" y="290">10B</text>
    <text x="72" y="212">100B</text>
  </g>

  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="150" y1="520" x2="1020" y2="520"/>
    <line x1="150" y1="442" x2="1020" y2="442"/>
    <line x1="150" y1="364" x2="1020" y2="364"/>
    <line x1="150" y1="286" x2="1020" y2="286"/>
    <line x1="150" y1="208" x2="1020" y2="208"/>
  </g>

  <path d="M190 512
           C 300 506, 390 492, 480 462
           S 640 386, 720 334
           S 860 240, 980 176"
        fill="none" stroke="#0b63ce" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="190" cy="512" r="8" fill="#0b63ce"/>
  <circle cx="480" cy="462" r="8" fill="#0b63ce"/>
  <circle cx="720" cy="334" r="8" fill="#0b63ce"/>
  <circle cx="980" cy="176" r="8" fill="#0b63ce"/>

  <rect x="170" y="536" width="110" height="34" rx="8" fill="#e8f1ff" stroke="#0b63ce" stroke-width="1.5"/>
  <text x="225" y="558" fill="#0b63ce" font-size="15" font-weight="700" text-anchor="middle">2022 말 10M</text>

  <rect x="420" y="485" width="118" height="34" rx="8" fill="#e8f1ff" stroke="#0b63ce" stroke-width="1.5"/>
  <text x="479" y="507" fill="#0b63ce" font-size="15" font-weight="700" text-anchor="middle">중간 단계</text>

  <rect x="652" y="352" width="150" height="34" rx="8" fill="#ecfeff" stroke="#0f766e" stroke-width="1.5"/>
  <text x="727" y="374" fill="#0f766e" font-size="15" font-weight="700" text-anchor="middle">90일 성장 가속</text>

  <rect x="874" y="130" width="156" height="38" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
  <text x="952" y="154" fill="#b45309" font-size="15" font-weight="700" text-anchor="middle">2026-05 45B</text>

  <text x="108" y="176" fill="#334155" font-size="16" font-weight="700" transform="rotate(-90 108 176)">연환산 매출</text>

  <g fill="#334155" font-size="16">
    <text x="180" y="560">2022</text>
    <text x="465" y="560">2024</text>
    <text x="705" y="560">2025</text>
    <text x="965" y="560">2026</text>
  </g>

  <text x="150" y="620" fill="#52616f" font-size="16">해석: 로그 축에서 직선처럼 보이지만 실제로는 3년 반 만에 약 4,500배 확대된 성장이다.</text>
</svg>
