  <rect x="708" y="148" width="430" height="216" rx="14" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
  <text x="736" y="188" fill="#111827" font-size="24" font-weight="800">수율 관리 방식</text>

  <g fill="#334155" font-size="18">
    <text x="736" y="230">1. redundant compute cores</text>
    <text x="736" y="266">2. redundant routing</text>
    <text x="736" y="302">3. fail-in-place architecture</text>
    <text x="736" y="338">4. 결함 블록 비활성화와 우회</text>
