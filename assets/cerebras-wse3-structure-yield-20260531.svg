  <text x="815" y="435" fill="#0b63ce" font-size="22" font-weight="800" text-anchor="middle">GPU</text>
  <text x="815" y="463" fill="#334155" font-size="16" text-anchor="middle">여러 칩 + 외부 HBM</text>

  <rect x="934" y="392" width="204" height="112" rx="12" fill="#fff7ed" stroke="#d97706" stroke-width="2.5"/>
  <text x="1036" y="435" fill="#b45309" font-size="22" font-weight="800" text-anchor="middle">Cerebras</text>
  <text x="1036" y="463" fill="#334155" font-size="16" text-anchor="middle">단일 웨이퍼 + 온칩 SRAM</text>

  <text x="44" y="616" fill="#52616f" font-size="16">그림: 본문 설명을 위해 자체 작성. 웨이퍼 내부의 일부 결함은 비활성화되어 실제 동작 가능한 칩으로 사용된다.</text>
