<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="Cerebras WSE-3 structure and yield management">
  <rect width="1200" height="680" rx="20" fill="#f8fafc"/>

  <text x="44" y="58" fill="#111827" font-size="30" font-weight="800">Cerebras WSE-3 구조와 수율 관리</text>
  <text x="44" y="92" fill="#52616f" font-size="18">12인치 웨이퍼 전체를 하나의 컴퓨터처럼 쓰되, 결함을 허용하고 우회하는 설계가 핵심이다.</text>

