<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430">
  <rect width="820" height="430" fill="#ffffff"/>
  <text x="60" y="55" font-family="Arial, sans-serif" font-size="28" fill="#111">Chain Rule = 연결된 변화율을 곱한다</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="70" y="145" width="130" height="90" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="120" y="198" font-family="Arial, sans-serif" font-size="30" fill="#111">x</text>
  <line x1="205" y1="190" x2="310" y2="190" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="220" y="165" font-family="Arial, sans-serif" font-size="18" fill="#444">u = 2x</text>
  <rect x="320" y="145" width="130" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
  <text x="375" y="198" font-family="Arial, sans-serif" font-size="30" fill="#111">u</text>
  <line x1="455" y1="190" x2="560" y2="190" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="472" y="165" font-family="Arial, sans-serif" font-size="18" fill="#444">y = u²</text>
  <rect x="570" y="145" width="130" height="90" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
  <text x="625" y="198" font-family="Arial, sans-serif" font-size="30" fill="#111">y</text>
  <text x="120" y="305" font-family="Arial, sans-serif" font-size="24" fill="#111">dy/dx = dy/du × du/dx</text>
  <text x="120" y="345" font-family="Arial, sans-serif" font-size="20" fill="#444">AI에서는 손실 L이 가중치 w에 얼마나 민감한지 거꾸로 계산할 때 쓴다.</text>
</svg>
