  <text x="690" y="355" font-family="Arial, sans-serif" font-size="18">x</text>
  <text x="105" y="45" font-family="Arial, sans-serif" font-size="18">y</text>
  <path d="M125 345 C220 330, 300 270, 375 205 C460 130, 540 85, 650 75" fill="none" stroke="#2563eb" stroke-width="5"/>
