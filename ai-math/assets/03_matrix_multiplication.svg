<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500">
  <rect width="920" height="500" fill="#ffffff"/>
  <text x="60" y="50" font-family="Arial, sans-serif" font-size="28" fill="#111">행렬곱 = 기존 특징을 섞어서 새 특징을 만든다</text>
  <text x="60" y="82" font-family="Arial, sans-serif" font-size="18" fill="#444">행은 데이터로 남고, 열은 새로운 의미의 특징으로 바뀐다.</text>
  <rect x="55" y="125" width="255" height="175" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <line x1="55" y1="175" x2="310" y2="175" stroke="#2563eb" stroke-width="2"/>
  <line x1="55" y1="235" x2="310" y2="235" stroke="#2563eb" stroke-width="2"/>
  <line x1="140" y1="125" x2="140" y2="300" stroke="#2563eb" stroke-width="2"/>
  <line x1="225" y1="125" x2="225" y2="300" stroke="#2563eb" stroke-width="2"/>
  <text x="78" y="158" font-family="Arial, sans-serif" font-size="16" fill="#111">사용자</text>
  <text x="153" y="158" font-family="Arial, sans-serif" font-size="16" fill="#111">액션</text>
  <text x="238" y="158" font-family="Arial, sans-serif" font-size="16" fill="#111">로맨스</text>
  <text x="93" y="212" font-family="Arial, sans-serif" font-size="22" fill="#2563eb">A</text>
  <text x="174" y="212" font-family="Arial, sans-serif" font-size="24">5</text>
  <text x="259" y="212" font-family="Arial, sans-serif" font-size="24">1</text>
  <text x="93" y="272" font-family="Arial, sans-serif" font-size="22" fill="#2563eb">B</text>
  <text x="174" y="272" font-family="Arial, sans-serif" font-size="24">1</text>
  <text x="259" y="272" font-family="Arial, sans-serif" font-size="24">5</text>
  <text x="92" y="332" font-family="Arial, sans-serif" font-size="21" fill="#2563eb">X: 기존 취향 특징</text>
  <text x="340" y="225" font-family="Arial, sans-serif" font-size="34" fill="#111">x</text>
  <rect x="390" y="125" width="255" height="175" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
  <line x1="390" y1="175" x2="645" y2="175" stroke="#16a34a" stroke-width="2"/>
  <line x1="390" y1="235" x2="645" y2="235" stroke="#16a34a" stroke-width="2"/>
  <line x1="475" y1="125" x2="475" y2="300" stroke="#16a34a" stroke-width="2"/>
  <line x1="560" y1="125" x2="560" y2="300" stroke="#16a34a" stroke-width="2"/>
  <text x="402" y="158" font-family="Arial, sans-serif" font-size="15" fill="#111">기존</text>
  <text x="489" y="150" font-family="Arial, sans-serif" font-size="14" fill="#111">액션</text>
  <text x="486" y="168" font-family="Arial, sans-serif" font-size="14" fill="#111">추천</text>
  <text x="574" y="150" font-family="Arial, sans-serif" font-size="14" fill="#111">로맨스</text>
  <text x="574" y="168" font-family="Arial, sans-serif" font-size="14" fill="#111">추천</text>
  <text x="405" y="212" font-family="Arial, sans-serif" font-size="17" fill="#111">액션</text>
  <text x="509" y="212" font-family="Arial, sans-serif" font-size="24">2</text>
  <text x="594" y="212" font-family="Arial, sans-serif" font-size="24">0</text>
  <text x="398" y="272" font-family="Arial, sans-serif" font-size="17" fill="#111">로맨스</text>
  <text x="509" y="272" font-family="Arial, sans-serif" font-size="24">1</text>
  <text x="594" y="272" font-family="Arial, sans-serif" font-size="24">3</text>
  <text x="425" y="332" font-family="Arial, sans-serif" font-size="21" fill="#16a34a">W: 새 특징을 만드는 규칙</text>
  <text x="675" y="225" font-family="Arial, sans-serif" font-size="34" fill="#111">=</text>
  <rect x="730" y="125" width="155" height="175" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
  <line x1="730" y1="175" x2="885" y2="175" stroke="#dc2626" stroke-width="2"/>
  <line x1="730" y1="235" x2="885" y2="235" stroke="#dc2626" stroke-width="2"/>
  <line x1="780" y1="125" x2="780" y2="300" stroke="#dc2626" stroke-width="2"/>
  <line x1="835" y1="125" x2="835" y2="300" stroke="#dc2626" stroke-width="2"/>
  <text x="744" y="158" font-family="Arial, sans-serif" font-size="15" fill="#111">사용자</text>
  <text x="791" y="150" font-family="Arial, sans-serif" font-size="14" fill="#111">액션</text>
  <text x="790" y="168" font-family="Arial, sans-serif" font-size="14" fill="#111">점수</text>
  <text x="843" y="150" font-family="Arial, sans-serif" font-size="14" fill="#111">로맨스</text>
  <text x="847" y="168" font-family="Arial, sans-serif" font-size="14" fill="#111">점수</text>
  <text x="750" y="212" font-family="Arial, sans-serif" font-size="22" fill="#dc2626">A</text>
  <text x="791" y="212" font-family="Arial, sans-serif" font-size="24">11</text>
  <text x="852" y="212" font-family="Arial, sans-serif" font-size="24">3</text>
  <text x="750" y="272" font-family="Arial, sans-serif" font-size="22" fill="#dc2626">B</text>
  <text x="798" y="272" font-family="Arial, sans-serif" font-size="24">7</text>
  <text x="846" y="272" font-family="Arial, sans-serif" font-size="24">15</text>
  <text x="735" y="332" font-family="Arial, sans-serif" font-size="21" fill="#dc2626">XW: 새 추천 특징</text>
  <text x="80" y="405" font-family="Arial, sans-serif" font-size="22" fill="#111">사용자 A의 새 특징: [5, 1] x W = [5*2 + 1*1, 5*0 + 1*3] = [11, 3]</text>
  <text x="80" y="440" font-family="Arial, sans-serif" font-size="20" fill="#444">기존 열: 액션/로맨스 선호도 -> 새 열: 액션 추천점수/로맨스 추천점수</text>
</svg>
