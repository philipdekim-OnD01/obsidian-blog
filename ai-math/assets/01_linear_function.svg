  <text x="385" y="115" font-family="Arial, sans-serif" font-size="28" fill="#111">y = wx + b</text>
  <text x="385" y="150" font-family="Arial, sans-serif" font-size="18" fill="#444">w: 기울기, b: 시작 위치</text>
  <text x="95" y="303" font-family="Arial, sans-serif" font-size="16" fill="#444">b</text>
</svg>
