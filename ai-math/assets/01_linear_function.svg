  <circle cx="365" cy="190" r="6" fill="#2563eb"/>
  <circle cx="610" cy="80" r="6" fill="#2563eb"/>
  <path d="M120 300 L220 300 L220 255" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="7 7"/>
  <text x="150" y="322" font-family="Arial, sans-serif" font-size="17" fill="#dc2626">x가 증가</text>
