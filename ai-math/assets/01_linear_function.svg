<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <rect width="720" height="420" fill="#ffffff"/>
  <line x1="80" y1="340" x2="650" y2="340" stroke="#222" stroke-width="2"/>
  <line x1="120" y1="370" x2="120" y2="50" stroke="#222" stroke-width="2"/>
  <text x="660" y="345" font-family="Arial, sans-serif" font-size="18">x</text>
  <text x="105" y="40" font-family="Arial, sans-serif" font-size="18">y</text>
  <line x1="120" y1="300" x2="610" y2="80" stroke="#2563eb" stroke-width="4"/>
